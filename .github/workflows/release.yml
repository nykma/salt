name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Package (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
            deb_arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            deb_arch: arm64
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build project (release mode)
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare binary for packaging
        run: |
          mkdir -p target/release
          cp target/${{ matrix.target }}/release/salt target/release/salt

      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Create DEB package
        run: cargo deb --no-build --target ${{ matrix.target }}

      - name: Create RPM package
        run: cargo generate-rpm --arch ${{ matrix.arch }}

      - name: Create Arch Linux package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp target/release/salt .
          cat > PKGBUILD <<EOF
          pkgname=salt
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="A high-performance CLI tool for password hashing generation and verification."
          arch=('${{ matrix.arch }}')
          url="https://github.com/nykma/salt"
          license=('MIT')
          depends=('glibc')
          source=("salt" "README.md")
          sha256sums=('SKIP' 'SKIP')

          package() {
              install -Dm755 salt "\${pkgdir}/usr/bin/salt"
              install -Dm644 README.md "\${pkgdir}/usr/share/doc/salt/README.md"
          }
          EOF
          # Run makepkg as a non-root user in a container
          docker run --rm -v $(pwd):/pkg archlinux:latest bash -c "
            pacman -Syu --noconfirm base-devel sudo
            useradd -m builder
            echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder
            chown -R builder:builder /pkg
            cd /pkg
            sudo -u builder makepkg --noconfirm
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/debian/*.deb
            target/generate-rpm/*.rpm
            *.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
